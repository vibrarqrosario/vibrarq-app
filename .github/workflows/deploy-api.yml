# Requiere el secret RENDER_DEPLOY_HOOK (Settings > Secrets and variables > Actions)
name: Deploy API a Render

on:
  push:
    branches: [main]
    paths:
      - 'apps/api/**'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/deploy-api.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Disparar deploy en Render
        run: |
          if [ -z "${{ secrets.RENDER_DEPLOY_HOOK }}" ]; then
            echo "::error::Falta el secret RENDER_DEPLOY_HOOK — agregarlo en Settings > Secrets and variables > Actions"
            exit 1
          fi
          curl -sf "${{ secrets.RENDER_DEPLOY_HOOK }}"
          echo "Deploy disparado en Render ✓"
